name: Mampostera CI v0.8

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.30.1"
  RUST_VERSION: "1.86.0"

jobs:
  # ── 1. Auditoría de seguridad (no-blocking) ──────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm audit --audit-level=high
        continue-on-error: true

  # ── 2. Build y test del programa Anchor ──────────────────────────────────
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }} --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      # ── Node 24 ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Caché de cargo ────────────────────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-
            cargo-${{ env.RUST_VERSION }}-

      # ── Solana CLI 1.18.26 ────────────────────────────────────────────────
      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # ── Anchor CLI 0.30.1 via AVM ─────────────────────────────────────────
      # AVM (Anchor Version Manager) maneja el patch de `time` internamente
      # y es la forma oficial recomendada por el equipo de Anchor.
      - name: Install AVM and Anchor CLI ${{ env.ANCHOR_VERSION }}
        run: |
          # Instalar AVM
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Instalar y usar anchor 0.30.1 via avm
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Verify tools
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version
          node --version

      # ── Billetera CI y Program ID ─────────────────────────────────────────
      - name: Configure build environment
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          sed -i "s/declare_id!(\"[^\"]*\")/declare_id!(\"$PROGRAM_ID\")/" \
            programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \"[^\"]*\"/mampostera = \"$PROGRAM_ID\"/g" \
            Anchor.toml
          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          echo "PROGRAM_ID=$PROGRAM_ID"            >> $GITHUB_ENV
          solana config set --url localhost

      # ── Dependencias JS ───────────────────────────────────────────────────
      - name: Install Node dependencies
        run: yarn install --no-frozen-lockfile

      # ── Build ─────────────────────────────────────────────────────────────
      # anchor build llama internamente a cargo-build-sbf que genera un
      # Cargo.lock v4 con Rust 1.86 y luego lo relee con un cargo interno
      # más viejo. Solución: patch en ~/.cargo/config.toml para forzar v3,
      # más rm del lockfile justo antes.
      - name: Patch cargo config to force lockfile v3
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
[unstable]
next-lockfile-bump = false
EOF
          rm -f Cargo.lock
          echo "Cargo config:"
          cat ~/.cargo/config.toml

      - name: Build Anchor program
        run: anchor build
        env:
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"
          RUSTFLAGS: 

      # ── Verificar IDL ─────────────────────────────────────────────────────
      - name: Verify IDL
        run: |
          python3 -c "
          import json
          d = json.load(open('target/idl/mampostera.json'))
          n = len(d.get('instructions', []))
          print(f'IDL OK — {n} instrucciones')
          "

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run Anchor tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json
          ANCHOR_PROVIDER_URL: http://localhost:8899

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
          retention-days: 14

  # ── 3. Build del frontend Next.js ─────────────────────────────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: test-program
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --no-frozen-lockfile

      - name: Type-check
        run: yarn tsc
        continue-on-error: true

      - name: Build Next.js
        run: yarn build
        env:
          NEXT_PUBLIC_PROGRAM_ID: "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK: "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT: "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"
          NEXT_PUBLIC_USDC_MINT: "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
          SKIP_ENV_VALIDATION: "1"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ github.sha }}
          path: .next/
          retention-days: 7

  # ── 4. Deploy a Devnet (sólo main) ────────────────────────────────────────
  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }} --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install AVM and Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Restore deploy wallet
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/wallet.json
          echo "ANCHOR_WALLET=/tmp/wallet.json" >> $GITHUB_ENV
          solana config set --url devnet

      - name: Check balance
        run: solana balance --keypair /tmp/wallet.json || true

      - name: Deploy program
        run: |
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Install Node deps
        run: yarn install --no-frozen-lockfile

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
          NEXT_PUBLIC_RPC_ENDPOINT: ${{ secrets.HELIUS_RPC_URL }}

  # ── 5. Deploy a Testnet (sólo release) ────────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }} --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-${{ env.ANCHOR_VERSION }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install AVM and Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Restore testnet wallet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/wallet.json
          echo "ANCHOR_WALLET=/tmp/wallet.json"             >> $GITHUB_ENV
          solana config set --url testnet

      - name: Deploy program
        run: |
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV

      - name: Install Node deps
        run: yarn install --no-frozen-lockfile

      - name: Publish IDL on-chain
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK: testnet
          NEXT_PUBLIC_RPC_ENDPOINT: https://api.testnet.solana.com
