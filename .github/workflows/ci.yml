name: Mampostera CI v0.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  NODE_VERSION: "20"
  CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"

jobs:
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Rust
        run: cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true
      - name: Audit Node
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - name: Remove ALL Cargo.lock files
        run: |
          rm -f Cargo.lock
          rm -f programs/mampostera/Cargo.lock
          find . -name "Cargo.lock" -delete 2>/dev/null || true
          echo "✅ Cargo.lock files: $(find . -name 'Cargo.lock' | wc -l)"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-v22-${{ hashFiles('programs/**/Cargo.toml') }}

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install AVM + anchor-cli 0.30.1
        env:
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install 0.30.1
          avm use 0.30.1
          # AVM puede instalar en .avm/bin o .cargo/bin según la versión
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Verificar con which (usa el PATH actualizado)
          export PATH="$HOME/.avm/bin:$HOME/.cargo/bin:$PATH"
          which anchor && anchor --version

      - name: Remove Cargo.lock generated by AVM
        run: |
          rm -f Cargo.lock
          rm -f programs/mampostera/Cargo.lock
          find . -name "Cargo.lock" -delete 2>/dev/null || true
          echo "✅ Post-AVM Cargo.lock files: $(find . -name 'Cargo.lock' | wc -l)"

      - name: Verify tools
        run: |
          echo "Rust:   $(rustc --version)"
          echo "Solana: $(solana --version)"
          echo "Anchor: $(anchor --version)"

      - name: Install Node dependencies
        run: yarn install

      - name: Configure build
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/" programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/" Anchor.toml
          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          solana config set --url localhost
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true
          
      - name: Fix permissions
        run: |
          sudo chown -R "$(id -u):$(id -g)" $HOME/.cache || true
          sudo chown -R "$(id -u):$(id -g)" $HOME/.local || true
          sudo chown -R "$(id -u):$(id -g)" $HOME/.cargo || true

      - name: Final Cargo.lock cleanup
        run: |
          rm -f Cargo.lock programs/mampostera/Cargo.lock
          find . -name "Cargo.lock" -delete 2>/dev/null || true

      - name: Build Anchor program
        run: anchor build
        env:
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"

      - name: Verify IDL
        run: |
          [ -f target/idl/mampostera.json ] \
            && python3 -c "import json; d=json.load(open('target/idl/mampostera.json')); print(f'✅ {len(d[\"instructions\"])} instrucciones')" \
            || echo "⚠️ IDL no encontrado"

      - name: Run tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
          retention-days: 14

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: test-program
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        run: |
          sed -i 's/"@civic\/solana-gateway-react": "\^0.9.10"/"@civic\/solana-gateway-react": "latest"/' \
            package.json 2>/dev/null || true
          yarn install --no-lockfile
        working-directory: frontend
      - name: Type check
        run: yarn tsc --noEmit
        working-directory: frontend
        continue-on-error: true
      - name: Build
        run: yarn build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROGRAM_ID: "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK: "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT: "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"
      - name: Upload frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet
    steps:
      - uses: actions/checkout@v4
      - name: Remove Cargo.lock
        run: rm -f Cargo.lock programs/mampostera/Cargo.lock
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Pre-create Solana dirs
        run: mkdir -p $HOME/.local/bin $HOME/.cache/solana && chmod 755 $HOME/.cache/solana
      - name: Install Solana
        run: |
          curl -sSfL "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install 0.30.1 && avm use 0.30.1
          rm -f Cargo.lock programs/mampostera/Cargo.lock
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Prep
        run: |
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true
          rm -f Cargo.lock programs/mampostera/Cargo.lock
      - name: Restore wallet
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/wallet.json
          echo "ANCHOR_WALLET=/tmp/wallet.json" >> $GITHUB_ENV
          solana config set --url devnet && solana balance
      - name: Deploy
        run: |
          rm -f Cargo.lock programs/mampostera/Cargo.lock
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"
        env:
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"
      - name: Deploy Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
          NEXT_PUBLIC_RPC_ENDPOINT: ${{ secrets.HELIUS_RPC_URL }}

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Remove Cargo.lock
        run: rm -f Cargo.lock programs/mampostera/Cargo.lock
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Pre-create Solana dirs
        run: mkdir -p $HOME/.local/bin $HOME/.cache/solana && chmod 755 $HOME/.cache/solana
      - name: Install Solana
        run: |
          curl -sSfL "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install 0.30.1 && avm use 0.30.1
          rm -f Cargo.lock programs/mampostera/Cargo.lock
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Prep
        run: |
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true
          rm -f Cargo.lock programs/mampostera/Cargo.lock
      - name: Restore wallet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/wallet.json
          echo "ANCHOR_WALLET=/tmp/wallet.json" >> $GITHUB_ENV
          solana config set --url testnet && solana balance
      - name: Deploy
        run: |
          rm -f Cargo.lock programs/mampostera/Cargo.lock
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
        env:
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP: "false"
      - name: Publish IDL
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet
      - name: Deploy Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK: testnet
          NEXT_PUBLIC_RPC_ENDPOINT: https://api.testnet.solana.com
