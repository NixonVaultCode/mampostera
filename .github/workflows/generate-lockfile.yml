name: Generate Cargo.lock v3
on:
  workflow_dispatch:
jobs:
  gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain 1.85.0 --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: |
          rm -f Cargo.lock
          CARGO_UNSTABLE_NEXT_LOCKFILE_BUMP=false $HOME/.cargo/bin/cargo generate-lockfile
          head -3 Cargo.lock
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: Cargo.lock v3 [skip ci]" && git push || echo "nada que commitear"
